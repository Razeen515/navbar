<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Navbar</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: black;
        }

        .navbar-brand {   /* title color */
            color: #ff0000;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .navbar-brand img {
            width: 40px;
            height: auto;
            margin-right: 8px;
        }

        .nav-link {
            color: #f4efef;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #27687a;
        }

        .btn-order {
            background-color: #084da1;
            color: #fff;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            padding: 5px 15px;
            transition: background-color 0.3s ease;
        }

        .btn-order:hover {
            background-color: #fefefe;
        }

        .cart-icon {
            color: #ddd;
            font-size: 1.5rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .cart-icon:hover {
            color: #1195c9;
        }

        .cart-icon .badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background-color: #084da1;
            color: #fff;
            border-radius: 50%;
            font-size: 0.75rem;
            padding: 2px 6px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <!-- Logo and Title -->
            <a class="navbar-brand" href="#">
                <img src="https://st2.depositphotos.com/3283677/6076/v/450/depositphotos_60768343-stock-illustration-food-delivery-cloche.jpg" alt="Logo"> 
                (TITLE SPACE)  
            </a>
            <!-- Toggler for Mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Navbar Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#menu">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#blog">Blog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#testimoinal">Testimonial</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact Us</a>
                    </li>

                    <!-- Cart Icon -->
                    <li class="nav-item ms-3">
                        <a class="nav-link cart-icon" href="#cart">
                            <i class="bi bi-cart"></i>
                            <span class="badge">3</span>
                        </a>
                    <li class="nav-item">
                        <a class="btn btn-order ms-3" href="#order">Order Now</a>
                    </li>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
